<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Contatos</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h2>Gerenciamento de Contatos</h2>

    <div class="search-box">
        <label for="searchNome">Busca</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="searchNome" placeholder="Digite o nome para busca...">
            <button id="btnBuscar">Buscar</button>
            <button id="btnNovo" class="cancel">Novo</button>
        </div>
    </div>

    <div class="form-box">
        <h3 id="formTitle">Novo Contato</h3>
        <form id="contatoForm">
            <input type="hidden" id="contatoId">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label>Fone:</label>
                <input type="text" id="telefone" required>
            </div>
            <div class="form-group">
                <label>E-mail:</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" id="btnSalvar">Salvar</button>
            <button type="button" id="btnCancelar" class="cancel">Cancelar</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaCorpo">
            </tbody>
    </table>
</div>
<link rel="stylesheet" href="src/css/style.css">

<script src="src/app.js" type="module"></script>
</body>
</html>
